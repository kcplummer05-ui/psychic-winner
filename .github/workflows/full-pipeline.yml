name: Full SDK Pipeline (Semantic + Real Tests)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sdk:
    runs-on: ubuntu-latest
    # Required for semantic-release and pushing tags
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      NODE_VERSION: 20
      PYTHON_VERSION: 3.11
      GO_VERSION: 1.21
      BASE_URL: https://api.openai.com/v1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/

      - name: 🟨 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🟩 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install generators + semantic-release
        run: |
          npm install -g @openapitools/openapi-generator-cli semantic-release @semantic-release/git @semantic-release/changelog @semantic-release/npm
          pip install openapi-python-client requests build twine
          go install github.com/deepmap/oapi-codegen/cmd/oapi-codegen@latest

      # Added this to ensure openai.json exists before generation
    - name: 📥 Fetch OpenAPI Spec
        run: |
          # We use the -L flag to follow redirects and ensure we get the RAW file
          curl -L https://raw.githubusercontent.com/openai/openapi-openapi/master/openapi.yaml -o openai.json

      - name: Generate SDKs
        run: |
          mkdir -p clients/typescript clients/python clients/go
          
          # TypeScript
          npx @openapitools/openapi-generator-cli generate -i openai.json -g typescript-fetch -o ./clients/typescript
          
          # Python
          openapi-python-client generate --path openai.json --output-path ./clients/python --overwrite

          # Go
          oapi-codegen -package client openai.json > ./clients/go/client.go

      - name: 🧪 Test TypeScript (real request)
        run: |
          cd clients/typescript
          npm init -y
          npm pkg set type="module"
          npm install node-fetch
          cat <<EOF > test.js
          import fetch from "node-fetch";
          const res = await fetch(process.env.BASE_URL + "/models", {
            headers: { Authorization: "Bearer " + process.env.OPENAI_API_KEY }
          });
          if (!res.ok) {
            console.error("TS API test failed:", res.status);
            process.exit(1);
          }
          console.log("TS API OK");
          EOF
          node test.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🧪 Test Python (real request)
        run: |
          python - <<EOF
          import os, requests
          res = requests.get(
              os.environ["BASE_URL"] + "/models",
              headers={"Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}"}
          )
          assert res.status_code == 200, f"Python API test failed: {res.status_code}"
          print("Python API OK")
          EOF
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🧪 Test Go (real request)
        run: |
          cat <<EOF > test.go
          package main
          import ("fmt"; "net/http"; "os")
          func main() {
            req, _ := http.NewRequest("GET", os.Getenv("BASE_URL")+"/models", nil)
            req.Header.Set("Authorization", "Bearer "+os.Getenv("OPENAI_API_KEY"))
            res, err := (&http.Client{}).Do(req)
            if err != nil || res.StatusCode != 200 { panic("Go API test failed") }
            fmt.Println("Go API OK")
          }
          EOF
          go run test.go
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🧠 Semantic Release
        run: |
          cat <<EOF > .releaserc.json
          {
            "branches": ["main"],
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              "@semantic-release/changelog",
              "@semantic-release/npm",
              "@semantic-release/git"
            ]
          }
          EOF
          semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 📦 Publish Python
        run: |
          cd clients/python/*
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: 📦 Publish Go Module
        run: |
          cd clients/go
          go mod init github.com/${{ github.repository }}/go-client || true
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v$(date +'%Y.%m.%d-%H%M')
          git push origin --tags
